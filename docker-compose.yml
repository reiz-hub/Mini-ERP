version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  DB_HOST: mysql
  DB_PORT: 3306
  DB_USERNAME: root
  DB_PASSWORD: root
  REDIS_HOST: redis
  REDIS_PORT: 6379
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: fitlife
  RABBITMQ_PASSWORD: fitlife_secret
  JWT_PUBLIC_KEY_PATH: /var/www/keys/public.pem

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: fitlife-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fitlife-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fitlife-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: fitlife
      RABBITMQ_DEFAULT_PASS: fitlife_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fitlife-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: fitlife-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fitlife-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ============================================================
  # Auth Service (Port 8001)
  # ============================================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: fitlife-auth-service
    restart: unless-stopped
    ports:
      - "8001:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_auth
      JWT_PRIVATE_KEY_PATH: /var/www/keys/private.pem
    volumes:
      - ./docker/jwt-keys:/var/www/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fitlife-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  # ============================================================
  # API Gateway (Port 8000)
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: fitlife-api-gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_api_gateway
      AUTH_SERVICE_URL: http://auth-service
      CRM_SERVICE_URL: http://crm-service
      MEMBERSHIP_SERVICE_URL: http://membership-service
      HR_SERVICE_URL: http://hr-service
      REPORTING_SERVICE_URL: http://reporting-service
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - fitlife-network
    logging: *default-logging

  # ============================================================
  # Consumer Services
  # ============================================================
  crm-service:
    build:
      context: ./crm-service
      dockerfile: Dockerfile
    container_name: fitlife-crm-service
    restart: unless-stopped
    ports:
      - "8002:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_crm
    volumes:
      - ./docker/jwt-keys:/var/www/keys:ro
      - ./docker/supervisord-worker.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fitlife-network
    logging: *default-logging

  membership-service:
    build:
      context: ./membership-service
      dockerfile: Dockerfile
    container_name: fitlife-membership-service
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_membership
    volumes:
      - ./docker/jwt-keys:/var/www/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fitlife-network
    logging: *default-logging

  hr-service:
    build:
      context: ./hr-service
      dockerfile: Dockerfile
    container_name: fitlife-hr-service
    restart: unless-stopped
    ports:
      - "8004:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_hr
    volumes:
      - ./docker/jwt-keys:/var/www/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fitlife-network
    logging: *default-logging

  reporting-service:
    build:
      context: ./reporting-service
      dockerfile: Dockerfile
    container_name: fitlife-reporting-service
    restart: unless-stopped
    ports:
      - "8005:80"
    environment:
      <<: *common-env
      DB_DATABASE: db_reporting
    volumes:
      - ./docker/jwt-keys:/var/www/keys:ro
      - ./docker/supervisord-worker.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fitlife-network
    logging: *default-logging

# ============================================================
# Volumes & Networks
# ============================================================
volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  fitlife-network:
    driver: bridge
