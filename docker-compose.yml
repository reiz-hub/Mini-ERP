services:

  # ============================================================
  # AUTH SERVICE
  # ============================================================
  auth-service:
    build:
      context: ./auth-service
    container_name: fitlife-auth-service
    restart: unless-stopped
    ports:
      - "8001:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./auth-service/.env:/var/www/html/.env
    networks:
      - fitlife-network

  # ============================================================
  # CRM SERVICE
  # ============================================================
  crm-service:
    build:
      context: ./crm-service
    container_name: fitlife-crm-service
    restart: unless-stopped
    ports:
      - "8002:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:80
    volumes:
      - ./crm-service/.env:/var/www/html/.env
    networks:
      - fitlife-network

  # ============================================================
  # MEMBERSHIP SERVICE
  # ============================================================
  membership-service:
    build:
      context: ./membership-service
    container_name: fitlife-membership-service
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:80
    volumes:
      - ./membership-service/.env:/var/www/html/.env
    networks:
      - fitlife-network

  # ============================================================
  # HR SERVICE
  # ============================================================
  hr-service:
    build:
      context: ./hr-service
    container_name: fitlife-hr-service
    restart: unless-stopped
    ports:
      - "8004:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:80
    volumes:
      - ./hr-service/.env:/var/www/html/.env
    networks:
      - fitlife-network

  # ============================================================
  # REPORTING SERVICE
  # ============================================================
  reporting-service:
    build:
      context: ./reporting-service
    container_name: fitlife-reporting-service
    restart: unless-stopped
    ports:
      - "8005:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:80
      CRM_SERVICE_URL: http://crm-service:80
      MEMBERSHIP_SERVICE_URL: http://membership-service:80
    volumes:
      - ./reporting-service/.env:/var/www/html/.env
    networks:
      - fitlife-network

  # ============================================================
  # API GATEWAY
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
    container_name: fitlife-api-gateway
    restart: unless-stopped

    ports:
      - "8000:80"

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:80
      CRM_SERVICE_URL: http://crm-service:80
      MEMBERSHIP_SERVICE_URL: http://membership-service:80
      HR_SERVICE_URL: http://hr-service:80
      REPORTING_SERVICE_URL: http://reporting-service:80

    volumes:
      - ./api-gateway/.env:/var/www/html/.env
      - ./api-gateway/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - auth-service
      - crm-service
      - membership-service
      - hr-service
      - reporting-service

    networks:
      - fitlife-network

    working_dir: /var/www/html

# ============================================================
# NETWORK
# ============================================================
networks:
  fitlife-network:
    driver: bridge
